name: tools_list_benchmark

on:
  workflow_dispatch:          # déclenchement manuel uniquement — remplacé par trigger_pingers.yml

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run benchmark
        run: |
          node tools_list_measurement.js
          echo "NEW_FILE=$(ls -t results/ | head -1)" >> $GITHUB_ENV

      - name: Push result to data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create data branch if it doesn't exist
          if git ls-remote --exit-code origin data > /dev/null 2>&1; then
            git worktree add .data_branch origin/data -b data_push 2>/dev/null || \
            git worktree add .data_branch data
          else
            git worktree add --orphan -b data .data_branch
          fi

          cp results/${{ env.NEW_FILE }} .data_branch/
          git -C .data_branch add "*.json"
          git -C .data_branch commit -m "result: ${{ env.NEW_FILE }}"

          for attempt in 1 2 3; do
            git -C .data_branch push origin HEAD:data && break
            git -C .data_branch pull --rebase origin data
          done

          git worktree remove .data_branch
